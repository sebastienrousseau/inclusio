name: MCP Protocol Conformance

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "inclusio/mcp/**"
      - "pyproject.toml"
      - ".github/workflows/mcp-inspect.yml"
  pull_request:
    branches: [main]
    paths:
      - "inclusio/mcp/**"
      - "pyproject.toml"
      - ".github/workflows/mcp-inspect.yml"

permissions:
  contents: read

jobs:
  inspect:
    name: MCP Inspector (tools/list)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install inclusio with mcp extra
        run: |
          python -m pip install --upgrade pip
          pip install '.[mcp]'

      - name: List tools via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli inclusio-mcp --method tools/list
