name: Build Documents

# Compiles the public-fixture documents (whisper-paper, cv, faq,
# user-guide) in both draft and camera-ready modes, then validates
# the produced PDFs. Complements verapdf.yml (which gates accessibility)
# by exercising the actual `python -m euxis_publisher.cli.build` path.

on:
  push:
    branches: [ main, develop, 'feat/*' ]
    paths:
      - 'src/**'
      - 'core/**'
      - 'data/**'
      - 'assets/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'euxis_publisher/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.mode }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        mode: [draft, camera-ready]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf  # v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install pyyaml jinja2 pikepdf pytest
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install pandoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pandoc

      - name: Install TeX Live (with tagpdf + tagged-PDF deps)
        # scheme-full matches verapdf.yml so pub-base.cls's full
        # dependency tree (tcolorbox, adjustbox, datetime2, ...) resolves.
        # The runner cache (~600 MB) makes repeat runs ~30 s.
        uses: zauguin/install-texlive@f5e7d0b117035fff797d4392ea94131747e03d60  # v4
        with:
          packages: >
            scheme-full
            tagpdf
            pdfx
            silence
            l3experimental
            latex-lab

      - name: Build documents
        # The build CLI walks data/meta.yaml; missing fixtures are
        # logged but don't fail the run (each doc reports its own
        # exit status). Use --doc to scope tighter on a slow PR.
        run: python3 -m euxis_publisher.cli.build build --mode ${{ matrix.mode }}

      - name: Validate PDFs
        run: python3 -m pytest tests/test_pdf_validation.py -v

      - name: Stamp PDFs with git provenance
        run: |
          if [ "${{ matrix.mode }}" = "camera-ready" ]; then
            python3 -m euxis_publisher.tools.stamp_pdfs build/
          else
            python3 -m euxis_publisher.tools.stamp_pdfs build/ \
              --watermark "DRAFT — $(git rev-parse --abbrev-ref HEAD)"
          fi

      - name: Render blog posts
        run: python3 -m euxis_publisher.cli.build blog

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pdfs-${{ matrix.mode }}
          path: build/**/*.pdf
          if-no-files-found: warn

      - name: Upload blog artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: blog-${{ matrix.mode }}
          path: build/blog/*.md
          if-no-files-found: warn

  lint:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf  # v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install pyyaml pikepdf pytest jinja2
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run semantic check
        run: bash scripts/check-semantic.sh

      - name: Run tests
        run: python3 -m pytest tests/ -v --ignore=tests/test_pdf_ua.py --ignore=tests/test_pdf_ua_classes.py
