name: Engine Validation

# Public engine quality gate. Runs on push to main/develop/feat/* and
# on PRs to main. Three jobs:
#
#   1. lint-python   — ruff check + ruff format --check
#   2. validate      — test suite, coverage, docs, doc-id registry
#   3. signed-commits — PR only; rejects unsigned commits in the diff
#
# All GitHub Actions are SHA-pinned (per docs/audit/2026-05.md
# action P-6); Dependabot rewrites SHAs on the weekly cycle.

on:
  push:
    branches: [ main, develop, 'feat/*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          python-version: "3.12"

      - name: Install ruff
        run: |
          uv venv
          uv pip install "ruff>=0.6.0"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: ruff check
        # Scope drops `scripts/` (legacy thin wrappers) via the
        # extend-exclude in pyproject.toml; per-file-ignores grandfather
        # the mock-heavy test_tailor / test_build suites.
        run: ruff check .

      - name: ruff format --check (engine + new tests)
        # Only enforce formatting on the engine source and the post-
        # Sprint-4 tests. Legacy tests (test_tailor, test_build_script,
        # test_render, ...) carry pre-Sprint-4 formatting that isn't
        # worth churning in one PR — they'll be reformatted incrementally
        # as their owning features get touched.
        run: |
          ruff format --check \
            inclusio/ \
            tests/test_overlay.py \
            tests/test_citation.py \
            tests/test_render_text.py \
            tests/test_eaa.py

  validate:
    name: Public Engine Checks (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up uv (with Python ${{ matrix.python-version }})
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          uv venv
          uv pip install pyyaml jinja2 pikepdf pytest pytest-cov pytest-benchmark "interrogate>=1.7" sphinx myst-parser furo "mcp[cli]>=1.27.0"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Show Python interpreter
        run: |
          which python
          python --version

      - name: Validate setup script guidance
        run: ./bin/setup

      - name: Run public engine test suite
        run: make test PYTHON=python

      - name: Measure coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: make coverage PYTHON=python

      - name: Verify 100% docstring coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: make docstrings PYTHON=python

      - name: Run hot-path benchmarks (3.12 only)
        if: matrix.python-version == '3.12'
        # Observational by default — surfaces the per-call cost of
        # render_text, score_cv, score_jd_fit, parse_citations, etc.
        # in the workflow log. Promote to a regression gate when a
        # baseline JSON gets checked in.
        run: make benchmark PYTHON=python

      - name: Build documentation with Sphinx (3.12 only)
        if: matrix.python-version == '3.12'
        run: make docs PYTHON=python

      - name: Verify expected doc IDs (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          # Use the package CLI directly (`python -m inclusio.cli.build`)
          # instead of the `scripts/build.py` thin shim — the shim imports
          # `inclusio`, which requires the package to be installed
          # (and we don't `pip install -e .` in this workflow on purpose,
          # to keep the CI tests verifying the in-tree code, not an
          # installed copy).
          python -m inclusio.cli.build list | tee /tmp/euxis-doc-list.txt
          for id in cv whisper-paper patent-paper patent-application faq user-guide-doc bio arxiv-paper preprint-paper prime-paper; do
            grep -q "${id}" /tmp/euxis-doc-list.txt || { echo "Missing expected doc id: ${id}"; exit 1; }
          done

  signed-commits:
    name: Signed-commit gate (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Reject unverified commits in the PR diff
        env:
          BASE_REF: ${{ github.base_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Use the GitHub commits API (`.commit.verification.verified`)
          # — same signal the web UI's "Verified" badge surfaces.
          # The local `git log %G?` approach needs
          # `gpg.ssh.allowedSignersFile` populated on the runner, which
          # we don't ship; that path returns `N` for every SSH-signed
          # commit and produces false negatives.
          unverified=""
          while read -r sha; do
            verified=$(gh api "repos/${REPO}/commits/${sha}" \
              --jq '.commit.verification.verified // false' 2>/dev/null || echo "false")
            if [ "$verified" != "true" ]; then
              reason=$(gh api "repos/${REPO}/commits/${sha}" \
                --jq '.commit.verification.reason // "unknown"' 2>/dev/null || echo "api-error")
              unverified="${unverified}${sha} ${reason}\n"
            fi
          done < <(git log --format='%H' "origin/${BASE_REF}..HEAD")
          if [ -n "$unverified" ]; then
            echo "::error::Unverified commits detected in this PR:"
            printf "$unverified"
            echo ""
            echo "See CONTRIBUTING.md for GPG / SSH signing setup."
            echo "The web UI's commit-list view shows the same"
            echo "verification status — investigate any commit not"
            echo "showing the green 'Verified' badge."
            exit 1
          fi
          echo "All commits in this PR are GitHub-verified."
