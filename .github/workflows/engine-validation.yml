name: Engine Validation

on:
  push:
    branches: [ main, develop, 'feat/*' ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Public Engine Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show Python Interpreter
        run: |
          which python
          python --version
          which python3
          python3 --version

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jinja2 pytest pytest-cov sphinx myst-parser furo

      - name: Validate setup script guidance
        run: ./bin/setup

      - name: Run public engine test suite
        run: make test

      - name: Measure coverage
        run: make coverage

      - name: Build documentation with Sphinx
        run: make docs

      - name: Verify expected doc IDs
        run: |
          python scripts/build.py list | tee /tmp/euxis-doc-list.txt
          for id in cv whisper-paper patent-paper patent-application faq user-guide-doc bio arxiv-paper preprint-paper prime-paper; do
            grep -q "${id}" /tmp/euxis-doc-list.txt || { echo "Missing expected doc id: ${id}"; exit 1; }
          done
