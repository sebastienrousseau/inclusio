name: pre-commit autoupdate

# Dependabot has no native `pre-commit` ecosystem, so this workflow
# runs `pre-commit autoupdate` on the same weekly cadence as the
# pip / github-actions Dependabot blocks (Mondays 06:00 UTC).
#
# When hook revisions change, a PR is opened against main. The PR is
# signed via the create-pull-request action's GitHub API path, so it
# satisfies the signed-commit gate enforced in engine-validation.yml.

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC, mirrors dependabot.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          uv venv
          uv pip install pre-commit
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run pre-commit autoupdate
        run: pre-commit autoupdate

      - name: Open PR if hook revisions changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8
        with:
          commit-message: "ci(pre-commit): autoupdate hook revisions"
          title: "ci(pre-commit): autoupdate hook revisions"
          body: |
            Automated weekly update of `.pre-commit-config.yaml` hook
            revisions. Generated by
            `.github/workflows/pre-commit-autoupdate.yml`.

            Review the diff for any breaking hook changes before merging.
          branch: ci/pre-commit-autoupdate
          delete-branch: true
          sign-commits: true
