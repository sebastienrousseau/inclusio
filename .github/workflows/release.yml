name: Release

# Triggered by pushing a `v*` tag. Builds the sdist + wheel, runs
# the public engine test suite once more on the tagged commit,
# attests the artefacts (SLSA L3 build provenance via
# actions/attest-build-provenance), and publishes a GitHub Release
# with auto-generated release notes derived from conventional
# commits since the previous tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # create release, upload artefacts
  id-token: write          # sigstore / attest-build-provenance OIDC + PyPI Trusted Publishing
  attestations: write      # attest-build-provenance writes here

jobs:
  release:
    name: Build, attest, release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Binds the job to the `pypi` GitHub environment so the PyPI
    # Trusted Publisher exchange resolves. The environment itself
    # holds no secrets/variables — the OIDC exchange happens at
    # publish time. Tag-rule on the environment additionally
    # restricts deployments to `v*` tag pushes (a belt-and-braces
    # check against the workflow's own `on.push.tags` trigger).
    environment:
      name: pypi
      url: https://pypi.org/p/inclusio

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0   # full history for release-notes generator

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          # Match the glob used by engine-validation.yml so the action
          # doesn't fall back to the default `**/uv.lock` (which we
          # don't have) and fail with "No matches found for glob".
          cache-dependency-glob: pyproject.toml
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          uv venv
          uv pip install --upgrade pip build pyyaml jinja2 pikepdf pytest pytest-cov
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run public engine test suite
        run: make test

      - name: Build sdist + wheel
        run: python -m build

      - name: Attest build provenance (SLSA L3)
        # GitHub attestations require either a public repo or a paid
        # plan with private-repo attestations enabled. Gate on a repo
        # variable so this step skips cleanly on private/free until
        # one of those is in place.
        #
        # To enable:
        #   Settings → Secrets and variables → Actions → Variables →
        #   set `SLSA_ATTESTATION_ENABLED=true`.
        if: vars.SLSA_ATTESTATION_ENABLED == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl

      - name: Verify signed commits since previous tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          previous=$(git describe --tags --abbrev=0 "${REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$previous" ]; then
            unsigned=$(git log --format='%H %G?' "${previous}..${REF_NAME}" | grep ' N$' || true)
            if [ -n "$unsigned" ]; then
              echo "::error::Unsigned commits between ${previous} and ${REF_NAME}:"
              echo "$unsigned"
              exit 1
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl

      - name: Publish to PyPI (Trusted Publishing)
        # Gated on the `PYPI_TRUSTED_PUBLISHING` repo variable so
        # the workflow stays green if the PyPI Trusted Publisher
        # isn't configured yet (e.g. on a fresh fork).
        #
        # The `pypi` environment + the publisher config on PyPI side
        # are the other two pieces; see CONTRIBUTING.md for the
        # full activation runbook.
        if: vars.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true
