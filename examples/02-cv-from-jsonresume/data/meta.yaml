# Registers the CV with `inclusio`. The template-driven flow renders
# templates/cv.tex.j2 against data/cv-data.yaml (generated by
# `inclusio import-resume`) and feeds the result through the build
# pipeline.

author:
  name: Jane Doe
  publisher: Inclusio Examples

documents:
  cv:
    class: pub-cv
    src: build/.cache/rendered/cv.tex
    title: Jane Doe — Senior Platform Engineer
    description: ATS-clean CV generated by inclusio from a JSON Resume document.
    keywords: python,go,kubernetes,postgres,sre
    render_from_template: true

templates:
  cv:
    type: cv
